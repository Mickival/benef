<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Asistencias</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="index.html">Sistema de Trabajo Comunitario</a>
  </nav>

  <div class="container">

    <a href="index.html" class="volver">← Volver al panel</a>

    <h1>Historial de Asistencias</h1>

    <div class="card" style="margin-bottom:24px;">
      <div style="display:flex; flex-wrap:wrap; gap:14px; align-items:flex-end;">

        <div>
          <label style="display:block; font-size:0.78rem; font-weight:700; text-transform:uppercase;
                        letter-spacing:0.4px; color:var(--gris-400); margin-bottom:5px;">Mes</label>
          <select id="mes_historial" class="select_actividad">
            <option value="">Mes</option>
            <option value="1">Enero</option>
            <option value="2">Febrero</option>
            <option value="3">Marzo</option>
            <option value="4">Abril</option>
            <option value="5">Mayo</option>
            <option value="6">Junio</option>
            <option value="7">Julio</option>
            <option value="8">Agosto</option>
            <option value="9">Septiembre</option>
            <option value="10">Octubre</option>
            <option value="11">Noviembre</option>
            <option value="12">Diciembre</option>
          </select>
        </div>

        <div>
          <label style="display:block; font-size:0.78rem; font-weight:700; text-transform:uppercase;
                        letter-spacing:0.4px; color:var(--gris-400); margin-bottom:5px;">Año</label>
          <select id="anio_historial" class="select_actividad"></select>
        </div>

        <div style="flex:1; min-width:220px;">
          <label style="display:block; font-size:0.78rem; font-weight:700; text-transform:uppercase;
                        letter-spacing:0.4px; color:var(--gris-400); margin-bottom:5px;">Actividad</label>
          <select id="actividad_historial" class="select_actividad" style="width:100%;"></select>
        </div>

      </div>
    </div>

    <div class="tabla-wrap">
      <table>
        <thead>
          <tr>
            <th>CI</th>
            <th>Nombre</th>
            <th>Carga</th>
            <th>Fecha</th>
            <th>Hora Ingreso</th>
            <th>Hora Salida</th>
            <th>Horas</th>
          </tr>
        </thead>
        <tbody id="tabla_historial"></tbody>
      </table>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
