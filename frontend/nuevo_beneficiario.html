<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Registrar Beneficiario</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="container">

<h1>Registrar nuevo beneficiario</h1>

<div class="formulario">

<label>CI</label>
<input id="ci">

<label>Nombre completo</label>
<input id="nombre">

<label>Teléfono</label>
<input id="telefono">

<label>CITE</label>
<input id="cite">

<label>Tipo de código</label>
<select id="tipo_codigo">
<option value="NUREJ">NUREJ</option>
<option value="CUD">CUD</option>
</select>

<label>Número de código</label>
<input id="codigo">

<label>Carga horaria</label>
<select  id="carga">
<option>Seleccione carga horaria</option>
<option value="4">4</option>
<option value="6">6</option>
<option value="8">8</option>
<option value="16">16</option>
</select>

<label>Fecha inicio</label>
<input type="date" id="fecha">

<label>Periodo (meses)</label>
<input id="periodo">

<br><br>

<button class="btn" onclick="registrarBeneficiario()">
Registrar beneficiario
</button>

<a href="index.html" class="btn_secundario">
Volver
</a>

</div>

</div>

<script src="js/app.js"></script>

</body>

</html>
