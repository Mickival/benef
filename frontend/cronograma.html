<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronograma de Actividades</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="index.html">Sistema de Trabajo Comunitario</a>
  </nav>

  <div class="page">

    <a href="index.html" class="volver">← Volver al panel</a>

    <h1>Cronograma de Actividades</h1>

    <div class="container_grid">

      <!-- FORMULARIO -->
      <div class="card formulario">

        <h2>Registrar actividad</h2>

        <label>Mes</label>
        <select id="mes">
          <option value="1">Enero</option>
          <option value="2">Febrero</option>
          <option value="3">Marzo</option>
          <option value="4">Abril</option>
          <option value="5">Mayo</option>
          <option value="6">Junio</option>
          <option value="7">Julio</option>
          <option value="8">Agosto</option>
          <option value="9">Septiembre</option>
          <option value="10">Octubre</option>
          <option value="11">Noviembre</option>
          <option value="12">Diciembre</option>
        </select>

        <label>Año</label>
        <select id="anio"></select>

        <label>Fecha</label>
        <input type="date" id="fecha">

        <label>Descripción de la actividad</label>
        <input id="actividad" placeholder="Ej: Limpieza del parque">

        <button class="btn_principal" onclick="registrarActividad()">
          Registrar Actividad
        </button>

      </div>

      <!-- TABLA -->
      <div class="tabla_panel">

        <h2 id="titulo_tabla">Actividades del mes</h2>

        <div class="tabla-wrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Actividad</th>
              </tr>
            </thead>
            <tbody id="tabla_actividades"></tbody>
          </table>
        </div>

      </div>

    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
